apiVersion: apps/v1
kind: Deployment
metadata:
  name: pmad-client
  labels:
    app: pmad-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pmad-client
  template:
    metadata:
      labels:
        app: pmad-client
    spec:
      containers:
      - name: pmad-client
        image: nginx:alpine # Utilisation temporaire d'un serveur web léger pour valider le flux K8s
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pmad-client-service
spec:
  type: NodePort
  selector:
    app: pmad-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
